<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketeam — Unlock Top Marketing Talent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Urbanist:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  /* ---------- rotating border angle ---------- */
  @property --border-angle{ syntax:'<angle>'; initial-value:0deg; inherits:false; }

  :root{
    --accent:#A068FF;
    --dark:#060218;
    --dark2:#070319;
    --ink:#000000;
    --light:#ffffff;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Inter',-apple-system,sans-serif;
    background:#0a0a0a;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  img{display:block; max-width:100%;}
  a{text-decoration:none; color:inherit;}
  ul{list-style:none;}

  .app{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    background:url('https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260624_111401_56af5012-2263-45d3-849a-8688084d7c2a.png&w=1280&q=85') center center / cover no-repeat;
  }

  /* ==================== HEADER ==================== */
  header.hdr{
    width:100%; max-width:1920px; margin:0 auto;
    display:flex; align-items:center; justify-content:space-between;
    padding:24px 64px;
    opacity:0;
    animation:fadeDown .8s cubic-bezier(0.22,1,0.36,1) .1s forwards;
  }
  .hdr-left{display:flex; align-items:center; gap:48px;}
  .logo{height:32px; width:auto;}
  nav.nav{display:flex; gap:34px;}
  nav.nav a{
    position:relative; color:var(--ink); font-size:15px; font-weight:400; padding:4px 0;
  }
  nav.nav a::after,
  .login::after{
    content:""; position:absolute; left:0; bottom:0; width:100%; height:1.5px;
    background:currentColor; transform:scaleX(0); transform-origin:left;
    transition:transform .3s ease;
  }
  nav.nav a:hover::after,
  .login:hover::after{transform:scaleX(1);}

  .hdr-right{display:flex; align-items:center; gap:28px;}
  .login{
    position:relative; color:var(--light); font-size:15px; font-weight:500; padding:4px 0;
  }

  /* pill button base */
  .btn{
    position:relative; overflow:hidden; display:inline-flex; align-items:center; gap:9px;
    border:none; cursor:pointer; border-radius:50px;
    background:var(--ink); color:var(--light);
    font-family:'Inter',sans-serif; font-size:15px; font-weight:500;
    padding:12px 26px; z-index:0;
  }
  .btn > *{position:relative; z-index:2;}
  .btn::after{
    content:""; position:absolute; inset:0; z-index:1; background:var(--accent);
    transform:translateX(-100%);
    transition:transform .4s cubic-bezier(0.22,1,0.36,1);
  }
  .btn:hover::after{transform:translateX(0);}
  .btn.from-right::after{transform:translateX(100%);}
  .btn.from-right:hover::after{transform:translateX(0);}

  /* rotating gradient border wrapper */
  .btn-border-wrap{position:relative; border-radius:50px; display:inline-block;}
  .btn-border-wrap::before{
    content:""; position:absolute; inset:-3px; border-radius:inherit; padding:3px; z-index:0;
    background:conic-gradient(from var(--border-angle), #A068FF, #070319, #A068FF, #070319, #A068FF);
    -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor; mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask-composite:exclude;
    animation:rotateBorder 3s linear infinite;
    pointer-events:none;
  }
  @keyframes rotateBorder{ to{ --border-angle:360deg; } }

  /* ==================== HERO ==================== */
  .hero{
    flex:1; width:100%; max-width:1920px; margin:0 auto;
    display:flex; align-items:center; justify-content:space-between; gap:40px;
    padding:0 64px;
  }

  /* ---- hero left ---- */
  .hero-left{
    flex:0 1 600px; padding-top:40px;
    opacity:0; animation:fadeUp 1s cubic-bezier(0.22,1,0.36,1) .2s forwards;
  }
  .hero-heading{
    font-family:'Urbanist',sans-serif; font-size:64px; font-weight:600;
    line-height:64px; letter-spacing:-1.5px; margin-bottom:38px; min-height:200px;
  }
  .tw-cursor{
    display:inline-block; width:3px; height:52px; background:var(--accent);
    margin-left:2px; transform:translateY(9px);
    animation:blink 1s steps(1) infinite;
  }
  .tw-cursor.done{display:none;}
  @keyframes blink{ 0%,50%{opacity:1;} 50.01%,100%{opacity:0;} }

  .cta-start{
    padding:14px 28px; font-size:16px; background:var(--dark);
    opacity:0; animation:fadeUp .6s cubic-bezier(0.22,1,0.36,1) 3.2s forwards;
  }
  .cta-start-wrap{opacity:0; animation:fadeIn .1s linear 3.2s forwards;}

  .cursor-badge{
    display:flex; align-items:center; gap:8px;
    margin-left:290px; margin-top:40px;
    opacity:0; animation:popCursor .5s cubic-bezier(0.22,1,0.36,1) 3.6s forwards;
  }
  .cursor-badge .label{
    background:var(--accent); color:var(--light); font-size:16px; font-weight:500;
    padding:8px 16px; border-radius:20px;
  }

  /* ---- hero right ---- */
  .hero-right{
    flex:0 0 auto; position:relative;
    opacity:0; animation:scaleIn 1.2s cubic-bezier(0.22,1,0.36,1) .3s forwards;
  }
  .circles{
    position:relative; width:720px; height:720px;
    transform-origin:center center;
  }

  .orbit{position:absolute; top:50%; left:50%; border-radius:50%;}
  .orbit::before{
    content:""; position:absolute; inset:0; border-radius:50%; padding:1px;
    background:linear-gradient(180deg, rgba(217,161,255,0) 0%, rgba(217,161,255,1) 43%, rgba(217,161,255,0) 100%);
    -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor; mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask-composite:exclude;
    pointer-events:none;
  }
  .orbit-1{width:353px; height:353px; margin:-176.5px 0 0 -176.5px; animation:spinL 30s linear infinite;}
  .orbit-2{width:501px; height:501px; margin:-250.5px 0 0 -250.5px; animation:spinR 40s linear infinite;}
  .orbit-3{width:649px; height:649px; margin:-324.5px 0 0 -324.5px; animation:spinR 50s linear infinite;}
  .orbit-4{width:797px; height:797px; margin:-398.5px 0 0 -398.5px; animation:spinL 60s linear infinite;}
  @keyframes spinL{ to{ transform:rotate(-360deg); } }
  @keyframes spinR{ to{ transform:rotate(360deg); } }

  /* center count-up (kept upright, static in container) */
  .center{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; z-index:5; pointer-events:none;
  }
  .center .num{font-family:'Urbanist',sans-serif; font-size:64px; font-weight:500; color:var(--ink); line-height:1;}
  .center .lbl{font-family:'Urbanist',sans-serif; font-size:16px; font-weight:600; color:var(--ink); margin-top:6px;}

  /* avatar slots (children of orbits) */
  .slot{position:absolute; top:50%; left:50%;}
  .slot img{
    width:58px; height:58px; object-fit:cover; border-radius:50%;
    opacity:0; animation:flyIn .9s cubic-bezier(0.22,1,0.36,1) both;
  }
  .g-purple{box-shadow:0 0 26px 2px rgba(160,104,255,.6);}
  .g-yellow{box-shadow:0 0 26px 2px rgba(255,214,90,.6);}
  .g-pink{box-shadow:0 0 26px 2px rgba(255,120,200,.6);}
  .g-blue{box-shadow:0 0 26px 2px rgba(90,160,255,.6);}
  .g-orange{box-shadow:0 0 26px 2px rgba(255,150,70,.6);}
  @keyframes flyIn{
    0%{opacity:0; transform:scale(.3) rotate(-180deg); filter:blur(10px);}
    100%{opacity:1; transform:scale(1) rotate(0); filter:blur(0);}
  }

  /* ==================== LOGO TICKER ==================== */
  .ticker{
    width:100%; padding:28px 0 40px; overflow:hidden;
    -webkit-mask-image:linear-gradient(90deg, transparent 0, #000 12%, #000 88%, transparent 100%);
    mask-image:linear-gradient(90deg, transparent 0, #000 12%, #000 88%, transparent 100%);
    opacity:0; animation:fadeUp 1s cubic-bezier(0.22,1,0.36,1) .6s forwards;
  }
  .ticker-track{display:flex; gap:64px; width:max-content; animation:scrollX 20s linear infinite;}
  .ticker-track img{width:137px; height:40px; object-fit:contain;}
  @keyframes scrollX{ to{ transform:translateX(-50%); } }

  /* ==================== ENTRANCE KEYFRAMES ==================== */
  @keyframes fadeDown{ from{opacity:0; transform:translateY(-20px);} to{opacity:1; transform:translateY(0);} }
  @keyframes fadeUp{ from{opacity:0; transform:translateY(40px);} to{opacity:1; transform:translateY(0);} }
  @keyframes fadeIn{ to{opacity:1;} }
  @keyframes scaleIn{ from{opacity:0; transform:scale(.85);} to{opacity:1; transform:scale(1);} }
  @keyframes popCursor{ from{opacity:0; transform:scale(.6) translateY(10px);} to{opacity:1; transform:scale(1) translateY(0);} }

  /* ==================== RESPONSIVE ==================== */
  @media (max-width:1280px){
    .circles{transform:scale(.85);}
  }
  @media (max-width:1024px){
    .hero{flex-direction:column; justify-content:center; gap:20px; padding:20px 40px 0;}
    .hero-left{flex:none; padding-top:20px; text-align:center;}
    .hero-heading{font-size:48px; line-height:52px; min-height:auto;}
    .cursor-badge{margin-left:0; justify-content:center;}
    .circles{transform:scale(.7);}
    .hero-right{margin-top:-60px;}
    .hdr-left{gap:26px;}
    nav.nav{gap:22px;}
    header.hdr{padding:20px 40px;}
  }
  @media (max-width:768px){
    nav.nav{display:none;}
    .hero-heading{font-size:36px; line-height:40px; letter-spacing:-1px;}
    .tw-cursor{height:32px;}
    .circles{transform:scale(.5);}
    .hero-right{margin-top:-120px; margin-bottom:-120px;}
    header.hdr{padding:18px 24px;}
    .hero{padding:16px 24px 0;}
  }
  @media (max-width:480px){
    .hero-heading{font-size:28px; line-height:32px;}
    .circles{transform:scale(.4);}
    .hero-right{margin-top:-160px; margin-bottom:-170px;}
    .btn{padding:10px 20px; font-size:14px;}
    .cta-start{padding:12px 22px; font-size:15px;}
    .ticker-track img{width:110px; height:34px;}
    .ticker-track{gap:44px;}
  }
</style>
</head>
<body>
<div class="app">

  <!-- ============ HEADER ============ -->
  <header class="hdr">
    <div class="hdr-left">
      <img class="logo" src="https://polo-pecan-73837341.figma.site/_assets/v11/17ae538989a509947a8de3892c644664895e69b1.png" alt="Marketeam">
      <nav class="nav">
        <a href="#">Your Team</a>
        <a href="#">Solutions</a>
        <a href="#">Blog</a>
        <a href="#">Pricing</a>
      </nav>
    </div>
    <div class="hdr-right">
      <a href="#" class="login">Log In</a>
      <div class="btn-border-wrap">
        <button class="btn"><span>Join Now</span></button>
      </div>
    </div>
  </header>

  <!-- ============ HERO ============ -->
  <section class="hero">

    <!-- LEFT -->
    <div class="hero-left">
      <h1 class="hero-heading"><span id="tw"></span><span class="tw-cursor" id="cursor"></span></h1>

      <div class="btn-border-wrap cta-start-wrap">
        <button class="btn cta-start from-right">
          <span>Start Project</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 12h14M13 6l6 6-6 6" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <div class="cursor-badge">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 3l14 8-6 2-2 6L5 3z" fill="#A068FF" stroke="#A068FF" stroke-width="1.2" stroke-linejoin="round"/>
        </svg>
        <span class="label">David</span>
      </div>
    </div>

    <!-- RIGHT: circles -->
    <div class="hero-right">
      <div class="circles">

        <!-- Orbit 4 (outermost) -->
        <div class="orbit orbit-4">
          <div class="slot" style="transform:translate(-50%,-50%) rotate(30deg) translate(399px) rotate(-30deg)">
            <img class="g-purple" src="https://polo-pecan-73837341.figma.site/_assets/v11/c76d8a0b99676de31c014344bfaf75bad090758d.png" style="animation-delay:1.8s" alt="">
          </div>
          <div class="slot" style="transform:translate(-50%,-50%) rotate(95deg) translate(399px) rotate(-95deg)">
            <img class="g-orange" src="https://polo-pecan-73837341.figma.site/_assets/v11/7b1b5f039de7b54cc9913e96c1923c3b15a157fa.png" style="width:88px;height:88px;border-radius:24px;animation-delay:2s" alt="">
          </div>
          <div class="slot" style="transform:translate(-50%,-50%) rotate(220deg) translate(399px) rotate(-220deg)">
            <img class="g-pink" src="https://polo-pecan-73837341.figma.site/_assets/v11/9ae171d8895199349755c43fbff00e122221a027.png" style="width:88px;height:88px;border-radius:24px;animation-delay:2.3s" alt="">
          </div>
          <div class="slot" style="transform:translate(-50%,-50%) rotate(320deg) translate(399px) rotate(-320deg)">
            <img class="g-purple" src="https://polo-pecan-73837341.figma.site/_assets/v11/926c9eb7b4bc1df846fa0e39f0b0dc3fefd80671.png" style="animation-delay:1.6s" alt="">
          </div>
        </div>

        <!-- Orbit 3 -->
        <div class="orbit orbit-3">
          <div class="slot" style="transform:translate(-50%,-50%) rotate(130deg) translate(325px) rotate(-130deg)">
            <img class="g-pink" src="https://polo-pecan-73837341.figma.site/_assets/v11/018736aa5d0275c4ce56cfebaf2ae3007d81ca1e.png" style="width:88px;height:88px;animation-delay:1.4s" alt="">
          </div>
        </div>

        <!-- Orbit 2 -->
        <div class="orbit orbit-2">
          <div class="slot" style="transform:translate(-50%,-50%) rotate(60deg) translate(251px) rotate(-60deg)">
            <img class="g-yellow" src="https://polo-pecan-73837341.figma.site/_assets/v11/ca755f7f93c1126fb8bdbf99ab364a33aa9ab272.png" style="animation-delay:1s" alt="">
          </div>
          <div class="slot" style="transform:translate(-50%,-50%) rotate(180deg) translate(251px) rotate(-180deg)">
            <img class="g-pink" src="https://polo-pecan-73837341.figma.site/_assets/v11/dc01064c7093dcc32674876ee3cf5e41c4a485c6.png" style="width:78px;height:78px;animation-delay:1.2s" alt="">
          </div>
          <div class="slot" style="transform:translate(-50%,-50%) rotate(300deg) translate(251px) rotate(-300deg)">
            <img class="g-blue" src="https://polo-pecan-73837341.figma.site/_assets/v11/d5470a58b02388336141575048720f19a50de832.png" style="border-radius:20px;animation-delay:.8s" alt="">
          </div>
        </div>

        <!-- Orbit 1 (innermost) -->
        <div class="orbit orbit-1">
          <div class="slot" style="transform:translate(-50%,-50%) rotate(270deg) translate(177px) rotate(-270deg)">
            <img class="g-purple" src="https://polo-pecan-73837341.figma.site/_assets/v11/aa51718fb3af3637e6d666b6543fc27a175fada6.png" style="border-radius:20px;animation-delay:.6s" alt="">
          </div>
        </div>

        <!-- Center counter -->
        <div class="center">
          <div class="num" id="counter">0k+</div>
          <div class="lbl">Specialists</div>
        </div>

      </div>
    </div>
  </section>

  <!-- ============ LOGO TICKER ============ -->
  <div class="ticker">
    <div class="ticker-track" id="track"></div>
  </div>

</div>

<script>
  /* ---------- Typewriter heading ---------- */
  (function(){
    const text = "Unlock Top Marketing Talent You Thought Was Out of Reach — Now Just One Click Away!";
    const SPLIT = 67;            // pehle 67 chars black, baaki white
    const SPEED = 35;            // ms per char
    const START_DELAY = 400;
    const el = document.getElementById('tw');
    const cursor = document.getElementById('cursor');

    const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    function render(n){
      const shown = text.slice(0, n);
      const black = esc(shown.slice(0, SPLIT));
      const white = esc(shown.slice(SPLIT));
      el.innerHTML = '<span style="color:#000000">'+black+'</span><span style="color:#ffffff">'+white+'</span>';
    }

    let i = 0;
    function type(){
      if(i > text.length){ cursor.classList.add('done'); return; }
      render(i);
      i++;
      setTimeout(type, SPEED);
    }
    setTimeout(type, START_DELAY);
  })();

  /* ---------- Count-up 0 -> 20 (easeOutCubic), start 1.2s, 2s ---------- */
  (function(){
    const el = document.getElementById('counter');
    const TARGET = 20, DURATION = 2000, DELAY = 1200;
    const easeOutCubic = t => 1 - Math.pow(1 - t, 3);

    function run(startTime){
      function frame(now){
        const t = Math.min((now - startTime) / DURATION, 1);
        const val = Math.round(easeOutCubic(t) * TARGET);
        el.textContent = val + 'k+';
        if(t < 1) requestAnimationFrame(frame);
        else el.textContent = TARGET + 'k+';
      }
      requestAnimationFrame(frame);
    }
    setTimeout(() => requestAnimationFrame(now => run(now)), DELAY);
  })();

  /* ---------- Logo ticker (5 logos x4 for seamless loop) ---------- */
  (function(){
    const logos = [
      'https://polo-pecan-73837341.figma.site/_assets/v11/1e7b0e6fcc016cd28aec5c68990118b8c54c35a5.svg',
      'https://polo-pecan-73837341.figma.site/_assets/v11/3eac03c183db2ae080d910159211c14843398b61.svg',
      'https://polo-pecan-73837341.figma.site/_assets/v11/17705a4c0023a0e5a99154dfb10582adbbf4260b.svg',
      'https://polo-pecan-73837341.figma.site/_assets/v11/0e5f442b09dc5c248e3e60d40a65505fb1887228.svg',
      'https://polo-pecan-73837341.figma.site/_assets/v11/63f99030ceb459e3c9ab9e429cfa2353491d3816.svg'
    ];
    const track = document.getElementById('track');
    // 4x repeat; -50% scroll => pehle 2 copies aur baaki 2 copies identical => seamless
    let html = '';
    for(let r=0; r<4; r++){
      logos.forEach(src => { html += '<img src="'+src+'" alt="partner logo">'; });
    }
    track.innerHTML = html;
  })();
</script>
</body>
</html>
